version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: company-research-mcp
    main: ./cmd/company-research-mcp
    binary: company-research-mcp
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X github.com/riftwerx/company-research-mcp/internal/mcp.Version={{.Version}}
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: checksums.txt

changelog:
  use: git
  sort: asc
  filters:
    exclude:
      - "^chore:"
      - "^docs:"
      - "^test:"

release:
  github:
    owner: riftwerx
    name: company-research-mcp
